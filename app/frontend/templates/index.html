<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Agent Quality Engineering Platform</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <main>
        <h1>Citizen Services AI Assistant</h1>

        <div id="chat-container">
            <div id="messages"></div>

            <form id="chat-form">
                <input
                    id="message-input"
                    type="text"
                    placeholder="Ask a question"
                    required
                >

                <button type="submit">Send</button>
            </form>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
