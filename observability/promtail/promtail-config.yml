server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ai-quality-platform
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai-quality-platform
          environment: development
          __path__: /var/log/ai-platform/*.log

    pipeline_stages:
      - json:
          expressions:
            event: event
            level: level
            correlation_id: correlation_id
            session_id: session_id

      - labels:
          event:
          level:
          correlation_id: