[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: unit tests
    api: API tests
    integration: integration tests
    database: database tests
    rag: RAG tests
    llm: LLM evaluation tests
    e2e: end-to-end tests
    regression: regression tests
    security: security tests

addopts =
    -ra
    --strict-markers